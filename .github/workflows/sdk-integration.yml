name: WireSock SDK Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'
  workflow_call:
    inputs:
      require_sdk_validation:
        description: Fail when real-SDK validation is not configured.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  configuration:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Report SDK validation status
        shell: pwsh
        env:
          SDK_INTEGRATION_ENABLED: ${{ vars.WIRESOCKUI_SDK_INTEGRATION_ENABLED }}
          SDK_INTEGRATION_REQUIRED: ${{ inputs.require_sdk_validation == true }}
        run: |
          if ($env:SDK_INTEGRATION_REQUIRED -eq 'true' -and $env:SDK_INTEGRATION_ENABLED -ne 'true') {
            throw 'Real-SDK validation is required. Register both SDK runners and set WIRESOCKUI_SDK_INTEGRATION_ENABLED=true.'
          }

          if ($env:SDK_INTEGRATION_ENABLED -eq 'true') {
            Write-Host 'Real-SDK validation is enabled.'
          }
          else {
            Write-Warning 'Real-SDK validation is unavailable because WIRESOCKUI_SDK_INTEGRATION_ENABLED is not true.'
            Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value '### Real-SDK validation unavailable'
            Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value 'The elevated wgbooster/driver smoke jobs were skipped because `WIRESOCKUI_SDK_INTEGRATION_ENABLED` is not `true`.'
          }

  elevated-sdk-smoke:
    needs: configuration
    if: vars.WIRESOCKUI_SDK_INTEGRATION_ENABLED == 'true'
    environment: wiresock-sdk
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ARM64
          - x64
    runs-on:
      - self-hosted
      - windows
      - ${{ matrix.platform }}
      - wiresock-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dotnet
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore WireSockUI.sln /p:Platform=${{ matrix.platform }} -m:1

      - name: Run elevated real-SDK lifecycle smoke test
        env:
          WIRESOCKUI_WGBOOSTER_PATH: ${{ matrix.platform == 'ARM64' && vars.WIRESOCKUI_WGBOOSTER_PATH_ARM64 || vars.WIRESOCKUI_WGBOOSTER_PATH_X64 }}
          WIRESOCKUI_TEST_PROFILE: ${{ vars.WIRESOCKUI_TEST_PROFILE }}
          WIRESOCKUI_TEST_PROFILE_TRANSPARENT: ${{ vars.WIRESOCKUI_TEST_PROFILE_TRANSPARENT }}
          WIRESOCKUI_TEST_PROFILE_VIRTUAL_ADAPTER: ${{ vars.WIRESOCKUI_TEST_PROFILE_VIRTUAL_ADAPTER }}
          WIRESOCKUI_TEST_PROFILE_AMNEZIA: ${{ vars.WIRESOCKUI_TEST_PROFILE_AMNEZIA }}
        run: >
          dotnet run --project WireSockUI.Tests/WireSockUI.Tests.csproj
          --configuration Release
          --framework net472-windows
          --no-restore
          /p:Platform=${{ matrix.platform }}
          /p:UseSharedCompilation=false
          --
          --sdk-integration
