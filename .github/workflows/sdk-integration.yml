name: WireSock SDK Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'
  workflow_call:
    inputs:
      required:
        description: Fail when real-SDK runners are not explicitly enabled
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  configuration:
    runs-on: windows-latest
    steps:
      - name: Require configured SDK runners
        if: inputs.required && vars.WIRESOCKUI_SDK_INTEGRATION_ENABLED != 'true'
        shell: pwsh
        run: throw 'Real-SDK validation is required for releases. Register both SDK runners and set WIRESOCKUI_SDK_INTEGRATION_ENABLED=true.'

      - name: Report optional SDK validation status
        if: inputs.required != true && vars.WIRESOCKUI_SDK_INTEGRATION_ENABLED != 'true'
        shell: pwsh
        run: Write-Host 'Real-SDK validation is disabled because WIRESOCKUI_SDK_INTEGRATION_ENABLED is not true.'

  elevated-sdk-smoke:
    needs: configuration
    if: vars.WIRESOCKUI_SDK_INTEGRATION_ENABLED == 'true'
    environment: wiresock-sdk
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ARM64
          - x64
    runs-on:
      - self-hosted
      - windows
      - ${{ matrix.platform }}
      - wiresock-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore WireSockUI.sln /p:Platform=${{ matrix.platform }} -m:1

      - name: Run elevated real-SDK lifecycle smoke test
        env:
          WIRESOCKUI_WGBOOSTER_PATH: ${{ matrix.platform == 'ARM64' && vars.WIRESOCKUI_WGBOOSTER_PATH_ARM64 || vars.WIRESOCKUI_WGBOOSTER_PATH_X64 }}
          WIRESOCKUI_TEST_PROFILE: ${{ vars.WIRESOCKUI_TEST_PROFILE }}
          WIRESOCKUI_TEST_PROFILE_TRANSPARENT: ${{ vars.WIRESOCKUI_TEST_PROFILE_TRANSPARENT }}
          WIRESOCKUI_TEST_PROFILE_VIRTUAL_ADAPTER: ${{ vars.WIRESOCKUI_TEST_PROFILE_VIRTUAL_ADAPTER }}
          WIRESOCKUI_TEST_PROFILE_AMNEZIA: ${{ vars.WIRESOCKUI_TEST_PROFILE_AMNEZIA }}
        run: >
          dotnet run --project WireSockUI.Tests/WireSockUI.Tests.csproj
          --configuration Release
          --framework net472-windows
          --no-restore
          /p:Platform=${{ matrix.platform }}
          /p:UseSharedCompilation=false
          --
          --sdk-integration
