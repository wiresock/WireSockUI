name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sdk-contract:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout WireSockUI
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify pinned direct SDK contract
        shell: pwsh
        run: ./scripts/Verify-WgboosterContract.ps1 -SdkRoot ./sdk-contract

  test:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore WireSockUI.sln /p:Platform=x64 -m:1

      - name: Verify formatting
        run: dotnet format WireSockUI.sln whitespace --verify-no-changes --no-restore

      - name: Run focused tests
        run: >
          dotnet run --project WireSockUI.Tests/WireSockUI.Tests.csproj
          --configuration Release
          --framework net472-windows
          --no-restore
          /p:Platform=x64
          /p:UseSharedCompilation=false

  sdk-integration:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    needs:
      - sdk-contract
      - test
    uses: ./.github/workflows/sdk-integration.yml
    with:
      require_sdk_validation: true
    secrets: inherit

  publish:
    runs-on: windows-latest
    timeout-minutes: 30
    needs:
      - sdk-contract
      - test
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Release
          - Release UWP
        platform:
          - AnyCPU
          - ARM64
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.x'

      - name: Publish WireSockUI
        run: >
          dotnet publish WireSockUI/WireSockUI.csproj
          --configuration "${{ matrix.configuration }}"
          --framework net472-windows
          --no-self-contained
          /p:Platform="${{ matrix.platform }}"
          /p:UseSharedCompilation=false
          /p:Version=0.0.0
          /p:Repository="${{ github.repository }}"
          -m:1
