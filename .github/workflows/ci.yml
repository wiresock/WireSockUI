name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run focused tests
        run: dotnet run --project WireSockUI.Tests/WireSockUI.Tests.csproj --configuration Release --framework net472-windows

  publish:
    runs-on: windows-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Release
          - Release UWP
        platform:
          - AnyCPU
          - ARM64
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish WireSockUI
        run: >
          dotnet publish WireSockUI/WireSockUI.csproj
          --configuration "${{ matrix.configuration }}"
          --framework net472-windows
          --no-self-contained
          /p:Platform="${{ matrix.platform }}"
          /p:UseSharedCompilation=false
          /p:Version=0.0.0
          /p:Repository="${{ github.repository }}"
          -m:1
