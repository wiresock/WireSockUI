#
# WireGuard sample configuration, please provide the necessary details
#
; Local Interface Definition
[Interface]
PrivateKey = 
; Local address in CIDR format
Address = 172.16.0.2/32
MTU = 1280
ListenPort = 49152
DNS = 1.0.0.1, 1.1.1.1
; Optional: force this profile to use or not use virtual adapter mode
#@ws:VirtualAdapterMode = false
; Optional: exclude LAN traffic from the tunnel
#@ws:BypassLanTraffic = false

; Peer Definition
[Peer]
PublicKey = 
; Optional: preshared key
PresharedKey = 
; Peer IPv4, IPv6 or DNS endpoint with port
Endpoint = myserver.dyndns.org:51820
AllowedIPs = 0.0.0.0/0, ::/0
; Optional: Send persistent keep alive packets every 5 minutes (900 sec)
PersistentKeepalive = 900

; WireSock extensions
#@ws:AllowedApps = discord
#@ws:DisallowedApps = chrome
#@ws:DisallowedIPs = 192.168.1.0/24

; SOCKS 5 Proxy to perform peer handshake
#@ws:Socks5Proxy = proxy.example.org:1080
#@ws:Socks5ProxyUsername = username
#@ws:Socks5ProxyPassword = some.password
#@ws:Socks5ProxyAllTraffic = false
